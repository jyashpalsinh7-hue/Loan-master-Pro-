name: Play Store Compliance & Build Scanner

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  compliance-and-build:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the source code
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Set up Java Environment
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    # 3. Grant execute permission for Gradle Wrapper
    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    # 4. Google Play Environment Check: Validate Target SDK Requirement
    - name: Verify Play Store SDK Compliance
      run: |
        TARGET_SDK=$(grep -oP 'targetSdk\s*=\s*\K[0-9]+' app/build.gradle* || echo "0")
        echo "Detected Target SDK: $TARGET_SDK"
        if [ "$TARGET_SDK" -lt 34 ]; then
          echo "::error::Google Play Store requires targeting at least SDK 34. Your app targets $TARGET_SDK."
          exit 1
        fi

    # 5. Google Play Environment Check: Block Manifest Debug Flags
    - name: Block Hardcoded Debug Flags
      run: |
        if grep -q 'android:debuggable="true"' app/src/main/AndroidManifest.xml 2>/dev/null; then
          echo "::error::Manifest contains android:debuggable='true'. Remove this before submitting to the Play Store."
          exit 1
        fi

    # 6. Static Application Security Testing (SAST)
    # CORRECTED ACTION PATH: Pointing to the official MobSF repo
    - name: Run MobSF Static Security Scan
      uses: MobSF/mobsfscan@v1
      with:
        args: '. --severity ERROR'

    # 7. Compile Release Bundle (AAB) & Run Contextual Linting
    - name: Build Release App Bundle (AAB)
      run: ./gradlew bundleRelease -Pandroid.experimental.lint.cms=false -Dlint.baselines=lint-baseline.xml
      env:
        GRADLE_OPTS: "-Dorg.gradle.project.android.bundle.enableUncompressedNativeLibs=false"

    # 8. Archive the production-ready artifact
    # CORRECTED ACTION PATH: Pointing to standard upload-artifact
    - name: Upload Bundle to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: play-store-release-bundle
        path: app/build/outputs/bundle/release/*.aab
