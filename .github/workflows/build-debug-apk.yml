name: Build Debug APK - Loan Master Pro

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "LICENSE"
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build, Test & Package
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle Executable
        run: chmod +x gradlew

      - name: Run Android Lint
        run: ./gradlew lintDebug --stacktrace --no-configuration-cache

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace --no-configuration-cache

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-configuration-cache

      - name: Rename APK
        run: |
          SHA=$(git rev-parse --short HEAD)
          APK_DIR="app/build/outputs/apk/debug"

          if [ -f "$APK_DIR/app-debug.apk" ]; then
            mv "$APK_DIR/app-debug.apk" \
            "$APK_DIR/Loan-Master-Pro-debug-$SHA.apk"
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Loan-Master-Pro-Debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
          if-no-files-found: error

      - name: Upload Unit Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Unit-Test-Results
          path: |
            app/build/test-results/
            app/build/reports/tests/
          retention-days: 14

      - name: Upload Lint Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Lint-Reports
          path: |
            app/build/reports/lint-results*
            app/build/reports/lint*
          retention-days: 14

      - name: Upload Mapping & Logs (if available)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Reports
          path: |
            app/build/reports/
            app/build/outputs/logs/
          retention-days: 14