name: Android CI/CD Production Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # Job 1: Static Code Analysis & Security Scans
  security_and_lint:
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Required for CodeQL/SARIF uploads
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Fixed MobSF Scan step: Saves report, removes invalid --severity flag, and prevents pipeline blockage
      - name: MobSF Security Scan
        run: |
          pip install mobsfscan
          mobsfscan . --json -o mobsf-report.json --no-fail

      - name: Upload MobSF Report
        uses: actions/upload-artifact@v4
        with:
          name: mobsf-security-report
          path: mobsf-report.json

  # Job 2: Build and Test the Android App
  build:
    needs: security_and_lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle' # Automatically caches Gradle dependencies to save time

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      # Runs internal unit tests
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      # Checks code quality rules without crashing if warnings exist
      - name: Run Android Lint
        run: ./gradlew lintDebug

      # Builds the final release bundle (AAB) or APK
      - name: Build Release App Bundle
        run: ./gradlew bundleRelease

      # Safely uploads the final artifact for Play Store distribution
      - name: Upload Production Artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-app-bundle
          path: app/build/outputs/bundle/release/*.aab
