name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Validate or Setup Gradle Wrapper
      run: |
        if [ ! -f "gradlew" ]; then
          echo "gradlew missing! Generating a fresh wrapper..."
          gradle wrapper
        fi
        chmod +x gradlew

    - name: Generate Debug Keystore in Expected Locations
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"
        mkdir -p app
        cp debug.keystore app/debug.keystore

    - name: Build with Gradle
      run: ./gradlew clean assembleDebug -Djava.awt.headless=true --stacktrace

    - name: Upload APK file
      uses: actions/upload-artifact@v4
      with:
        name: LoanMaster-Pro-APK
        path: app/build/outputs/apk/debug/app-debug.apk
